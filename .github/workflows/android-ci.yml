name: Android CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle (pin compatible version)
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.7
          cache-disabled: true

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required Android SDK components
        shell: bash
        run: |
          set -euxo pipefail
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0"

      - name: Assemble Debug (deterministic stderr capture)
        id: assemble
        shell: bash
        run: |
          set +e

          if [[ -x "./gradlew" ]]; then
            BUILD_TOOL=(./gradlew)
          else
            BUILD_TOOL=(gradle)
          fi

          "${BUILD_TOOL[@]}" --version 2>&1 | tee gradle-version.log

          if [[ -n "${ANDROID_SDK_ROOT:-}" ]]; then
            echo "sdk.dir=${ANDROID_SDK_ROOT}" > local.properties
          elif [[ -n "${ANDROID_HOME:-}" ]]; then
            echo "sdk.dir=${ANDROID_HOME}" > local.properties
          fi

          "${BUILD_TOOL[@]}" :app:assembleDebug --stacktrace --console=plain \
            > >(tee assemble.stdout.log) \
            2> >(tee assemble.stderr.log >&2)
          status=$?

          cat assemble.stdout.log assemble.stderr.log > assemble.log

          first_line=""
          offending_path=""
          line_no=""

          if [[ "$status" -eq 0 ]]; then
            first_line="ASSEMBLE_SUCCESS"
            offending_path="none"
          else
            if [[ -s assemble.stderr.log ]]; then
              first_line=$(grep -m1 -E '^e: file:///.+\.(kt|java|kts|gradle|xml):[0-9]+:[0-9]+' assemble.stderr.log || true)
              if [[ -z "$first_line" ]]; then
                first_line=$(grep -m1 -E '^e: .+\.(kt|java|kts|gradle|xml):[0-9]+:[0-9]+' assemble.stderr.log || true)
              fi
              if [[ -z "$first_line" ]]; then
                first_line=$(grep -m1 -E '^[^[:space:]]+\.(kt|java|xml|gradle|kts|properties):[0-9]+(:[0-9]+)?(: error:|: )' assemble.stderr.log || true)
              fi
              if [[ -z "$first_line" ]]; then
                first_line=$(grep -m1 -E 'SDK location not found\.|local\.properties' assemble.stderr.log || true)
              fi
              if [[ -z "$first_line" ]]; then
                first_line=$(grep -m1 -E '^Execution failed for task '\''(:[^'\'']+)'\''' assemble.stderr.log || true)
              fi
              if [[ -z "$first_line" ]]; then
                first_line=$(grep -m1 -E '(error|ERROR|failed|FAILED|Exception|exception)' assemble.stderr.log || true)
              fi
              if [[ -z "$first_line" ]]; then
                first_line=$(awk 'NF {print; exit}' assemble.stderr.log)
              fi
            fi

            if [[ -z "$first_line" && -s assemble.stdout.log ]]; then
              first_line=$(grep -m1 -E "^(Build|Settings|Script) file '.+' line: [0-9]+" assemble.stdout.log || true)
              if [[ -z "$first_line" ]]; then
                first_line=$(grep -m1 -E "^Execution failed for task ':[^']+'" assemble.stdout.log || true)
              fi
              if [[ -z "$first_line" ]]; then
                first_line=$(awk '/^\* What went wrong:/{flag=1;next} flag && NF {print; exit}' assemble.stdout.log)
              fi
              if [[ -z "$first_line" ]]; then
                first_line=$(grep -m1 -E '(error|ERROR|failed|FAILED|Exception|exception)' assemble.stdout.log || true)
              fi
              if [[ -z "$first_line" ]]; then
                first_line=$(awk 'NF {print; exit}' assemble.stdout.log)
              fi
            fi

            if [[ -z "$first_line" ]]; then
              first_line="ASSEMBLE_FAILED_WITHOUT_MATCH"
            fi

            if [[ "$first_line" =~ file:///([^:]+):([0-9]+):([0-9]+) ]]; then
              offending_path="${BASH_REMATCH[1]}"
              line_no="${BASH_REMATCH[2]}"
              rel_path="${offending_path#${GITHUB_WORKSPACE}/}"
              echo "::error file=${rel_path},line=${line_no}::${first_line}"
              offending_path="$rel_path"
            elif [[ "$first_line" =~ ^e:\ (.+\.(kt|java|kts|gradle|xml)):([0-9]+):([0-9]+) ]]; then
              offending_path="${BASH_REMATCH[1]}"
              line_no="${BASH_REMATCH[3]}"
              rel_path="${offending_path#${GITHUB_WORKSPACE}/}"
              echo "::error file=${rel_path},line=${line_no}::${first_line}"
              offending_path="$rel_path"
            elif [[ "$first_line" =~ ^([^:]+\.(kt|java|xml|gradle|kts|properties)):([0-9]+): ]]; then
              offending_path="${BASH_REMATCH[1]}"
              line_no="${BASH_REMATCH[2]}"
              rel_path="${offending_path#${GITHUB_WORKSPACE}/}"
              echo "::error file=${rel_path},line=${line_no}::${first_line}"
              offending_path="$rel_path"
            elif [[ "$first_line" =~ local\.properties|SDK\ location\ not\ found ]]; then
              offending_path="local.properties"
              line_no="1"
              echo "::error file=local.properties,line=1::${first_line}"
            elif [[ "$first_line" =~ ^Execution\ failed\ for\ task\ \'(:[^\']+)\' ]]; then
              task_path="${BASH_REMATCH[1]}"
              if [[ "$task_path" == :app:* ]]; then
                offending_path="app/build.gradle.kts"
                line_no="1"
                echo "::error file=app/build.gradle.kts,line=1::${first_line}"
              else
                offending_path="build.gradle.kts"
                line_no="1"
                echo "::error file=build.gradle.kts,line=1::${first_line}"
              fi
            else
              offending_path=".github/workflows/android-ci.yml"
              line_no="1"
              echo "::error file=.github/workflows/android-ci.yml,line=1::${first_line}"
            fi
          fi

          {
            echo "exit_code=${status}"
            echo "offending_path=${offending_path}"
            echo "first_actionable_line<<EOF"
            echo "$first_line"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          exit "$status"

      - name: Run Unit Tests (deterministic capture)
        id: unit_tests
        if: steps.assemble.outputs.exit_code == '0'
        continue-on-error: true
        shell: bash
        run: |
          set +e

          if [[ -x "./gradlew" ]]; then
            BUILD_TOOL=(./gradlew)
          else
            BUILD_TOOL=(gradle)
          fi

          "${BUILD_TOOL[@]}" :app:testDebugUnitTest --stacktrace --console=plain \
            > >(tee unit-tests.stdout.log) \
            2> >(tee unit-tests.stderr.log >&2)
          status=$?

          cat unit-tests.stdout.log unit-tests.stderr.log > unit-tests.log

          echo "exit_code=${status}" >> "$GITHUB_OUTPUT"

          exit "$status"

      - name: Extract first actionable unit-test failure line
        id: unit_extract
        if: steps.assemble.outputs.exit_code == '0' && steps.unit_tests.outputs.exit_code != '0'
        shell: bash
        run: |
          set +e

          first_line=""
          offending_path=""
          line_no=""
          frame_line=""
          classname=""
          task_path=""

          if [[ -s unit-tests.stderr.log ]]; then
            first_line=$(grep -m1 -E "^Execution failed for task ':[^']+'" unit-tests.stderr.log || true)
          fi
          if [[ -z "$first_line" && -s unit-tests.stdout.log ]]; then
            first_line=$(grep -m1 -E "^Execution failed for task ':[^']+'" unit-tests.stdout.log || true)
          fi
          if [[ -z "$first_line" && -s unit-tests.stdout.log ]]; then
            first_line=$(grep -m1 -E '^[[:space:]]*[[:alnum:]_.$]+[[:space:]]*>[[:space:]]+.+[[:space:]]+FAILED$' unit-tests.stdout.log || true)
          fi
          if [[ -z "$first_line" && -s unit-tests.stderr.log ]]; then
            first_line=$(grep -m1 -E 'AssertionError|ComparisonFailure|Caused by:|java\.lang\.[[:alnum:]_$.]+:|kotlin\.[[:alnum:]_$.]+:' unit-tests.stderr.log || true)
          fi
          if [[ -z "$first_line" && -s unit-tests.stdout.log ]]; then
            first_line=$(grep -m1 -E 'AssertionError|ComparisonFailure|Caused by:|java\.lang\.[[:alnum:]_$.]+:|kotlin\.[[:alnum:]_$.]+:' unit-tests.stdout.log || true)
          fi

          if [[ "$first_line" == "* Exception is:" || "$first_line" == "Exception is:" ]]; then
            first_line=""
          fi

          report_dir="app/build/test-results/testDebugUnitTest"
          first_xml=""
          if [[ -d "$report_dir" ]]; then
            first_xml=$(grep -rl --include='TEST-*.xml' '<failure' "$report_dir" 2>/dev/null | head -n1)
          fi

          if [[ -n "$first_xml" ]]; then
            testcase_line=$(awk '/<testcase /{tc=$0} /<failure/{print tc; exit}' "$first_xml")
            failure_line=$(grep -m1 '<failure' "$first_xml" || true)
            xml_class=$(printf '%s\n' "$testcase_line" | sed -n 's/.*classname="\([^"]*\)".*/\1/p')
            xml_test=$(printf '%s\n' "$testcase_line" | sed -n 's/.*name="\([^"]*\)".*/\1/p')
            xml_msg=$(printf '%s\n' "$failure_line" | sed -n 's/.*message="\([^"]*\)".*/\1/p')

            if [[ -n "$xml_class" ]]; then
              classname="$xml_class"
            fi

            if [[ -n "$xml_class" && -n "$xml_test" ]]; then
              if [[ -n "$xml_msg" ]]; then
                first_line="${xml_class} > ${xml_test} FAILED: ${xml_msg}"
              else
                first_line="${xml_class} > ${xml_test} FAILED"
              fi
            fi

            frame_line=$(grep -m1 -Eo 'at [[:alnum:]_.$]+\(([^:]+\.(kt|java)):[0-9]+\)' "$first_xml" || true)
          fi

          if [[ -z "$frame_line" && -s unit-tests.log ]]; then
            frame_line=$(grep -m1 -E '^[[:space:]]*at [[:alnum:]_.$]+\(([^:]+\.(kt|java)):[0-9]+\)' unit-tests.log || true)
          fi

          if [[ -n "$first_line" ]]; then
            task_path=$(printf '%s\n' "$first_line" | sed -n "s/^Execution failed for task '\\(:[^']\\+\\)'.*/\\1/p")
            classname_from_line=$(printf '%s\n' "$first_line" | sed -n 's/^[[:space:]]*\([[:alnum:]_.$]\+\)[[:space:]]*>.*/\1/p')
            if [[ -n "$classname_from_line" ]]; then
              classname="$classname_from_line"
            fi
          fi

          if [[ -n "$first_line" ]]; then
            if printf '%s\n' "$first_line" | grep -qE '^e: file:///'; then
              offending_path=$(printf '%s\n' "$first_line" | sed -n 's|^e: file:///\([^:]*\):\([0-9]\+\):\([0-9]\+\).*$|\1|p')
              line_no=$(printf '%s\n' "$first_line" | sed -n 's|^e: file:///\([^:]*\):\([0-9]\+\):\([0-9]\+\).*$|\2|p')
            elif printf '%s\n' "$first_line" | grep -qE '^e: .+\.(kt|java|kts|gradle|xml):[0-9]+:[0-9]+'; then
              offending_path=$(printf '%s\n' "$first_line" | sed -n 's|^e: \([^:]*\.[A-Za-z0-9]\+\):\([0-9]\+\):\([0-9]\+\).*$|\1|p')
              line_no=$(printf '%s\n' "$first_line" | sed -n 's|^e: \([^:]*\.[A-Za-z0-9]\+\):\([0-9]\+\):\([0-9]\+\).*$|\2|p')
            elif printf '%s\n' "$first_line" | grep -qE '^[^[:space:]]+\.(kt|java|xml|gradle|kts|properties):[0-9]+'; then
              offending_path=$(printf '%s\n' "$first_line" | sed -n 's|^\([^:]*\.[A-Za-z0-9]\+\):\([0-9]\+\).*$|\1|p')
              line_no=$(printf '%s\n' "$first_line" | sed -n 's|^\([^:]*\.[A-Za-z0-9]\+\):\([0-9]\+\).*$|\2|p')
            elif printf '%s\n' "$first_line" | grep -qE "^(Build|Settings|Script) file '.+' line: [0-9]+"; then
              offending_path=$(printf '%s\n' "$first_line" | sed -n "s/^[A-Za-z]* file '\\([^']*\\)' line: \\([0-9]\\+\\).*$/\\1/p")
              line_no=$(printf '%s\n' "$first_line" | sed -n "s/^[A-Za-z]* file '\\([^']*\\)' line: \\([0-9]\\+\\).*$/\\2/p")
            fi
          fi

          if [[ -n "$offending_path" ]]; then
            offending_path="${offending_path#${GITHUB_WORKSPACE}/}"
          fi

          if [[ -z "$offending_path" && -n "$frame_line" ]]; then
            file_name=$(printf '%s\n' "$frame_line" | sed -n 's/.*(\([^:]*\.\(kt\|java\)\):\([0-9]\+\)).*/\1/p')
            frame_line_no=$(printf '%s\n' "$frame_line" | sed -n 's/.*(\([^:]*\.\(kt\|java\)\):\([0-9]\+\)).*/\3/p')
            if [[ -n "$file_name" ]]; then
              rel_path=$(find app/src/test app/src/androidTest app/src/main -type f -name "$file_name" 2>/dev/null | head -n1)
              if [[ -z "$rel_path" ]]; then
                rel_path="$file_name"
              fi
              offending_path="$rel_path"
              if [[ -z "$line_no" ]]; then
                line_no="$frame_line_no"
              fi
            fi
          fi

          if [[ -z "$offending_path" && -n "$classname" ]]; then
            base_class="${classname%%\$*}"
            class_rel="${base_class//./\/}"
            for candidate in \
              "app/src/test/java/${class_rel}.kt" \
              "app/src/test/java/${class_rel}.java" \
              "app/src/main/java/${class_rel}.kt" \
              "app/src/main/java/${class_rel}.java"; do
              if [[ -f "$candidate" ]]; then
                offending_path="$candidate"
                break
              fi
            done

            if [[ -z "$offending_path" ]]; then
              simple_class="${base_class##*.}"
              rel_path=$(find app/src/test app/src/main -type f \( -name "${simple_class}.kt" -o -name "${simple_class}.java" \) 2>/dev/null | head -n1)
              if [[ -n "$rel_path" ]]; then
                offending_path="$rel_path"
              fi
            fi
          fi

          if [[ -z "$offending_path" && -n "$task_path" ]]; then
            if [[ "$task_path" == :app:* ]]; then
              offending_path="app/build.gradle.kts"
              line_no="1"
            else
              offending_path="build.gradle.kts"
              line_no="1"
            fi
          fi

          if [[ -z "$first_line" ]]; then
            first_line="UNIT_TEST_FAILED_WITHOUT_MATCH"
          fi

          if [[ -z "$offending_path" ]]; then
            offending_path="app/src/test"
            line_no="1"
          fi

          if [[ -z "$line_no" ]]; then
            line_no="1"
          fi

          echo "::error file=${offending_path},line=${line_no}::${first_line}"

          {
            echo "offending_path=${offending_path}"
            echo "first_actionable_line<<EOF"
            echo "$first_line"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Fail job when unit tests fail
        if: steps.assemble.outputs.exit_code == '0' && steps.unit_tests.outputs.exit_code != '0'
        shell: bash
        run: exit 1

      - name: Upload CI logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-ci-logs
          if-no-files-found: warn
          path: |
            local.properties
            gradle-version.log
            assemble.stdout.log
            assemble.stderr.log
            assemble.log
            unit-tests.stdout.log
            unit-tests.stderr.log
            unit-tests.log