name: Android CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle (pin compatible version)
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.7
          cache-disabled: true

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Assemble Debug
        run: |
          set -o pipefail
          gradle --version
          gradle assembleDebug --stacktrace 2>&1 | tee assemble.log

      - name: Run Unit Tests
        run: |
          set -o pipefail
          gradle testDebugUnitTest --stacktrace 2>&1 | tee unit-tests.log

      - name: Upload CI logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-ci-logs
          if-no-files-found: warn
          path: |
            assemble.log
            unit-tests.log