name: Android CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle (pin compatible version)
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.7
          cache-disabled: true

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Assemble Debug (deterministic stderr capture)
        id: assemble
        shell: bash
        run: |
          set +e
          gradle --version 2>&1 | tee gradle-version.log
          gradle assembleDebug --stacktrace --console=plain 2>&1 | tee assemble.log
          status=${PIPESTATUS[0]}

          first_line=""
          offending_path=""
          line_no=""
          build_context_line=""

          if [[ -s assemble.log ]]; then
            # Kotlin/JVM compiler actionable lines.
            first_line=$(grep -m1 -E '^e: file:///.+\.(kt|java):[0-9]+:[0-9]+' assemble.log || true)
            if [[ -z "$first_line" ]]; then
              first_line=$(grep -m1 -E '^.+\.(kt|java):[0-9]+: error:' assemble.log || true)
            fi

            # Android resource linker/AAPT actionable lines.
            if [[ -z "$first_line" ]]; then
              first_line=$(grep -m1 -E '^[^[:space:]]+/(src/main/res|res)/[^:]+:[0-9]+:.*(AAPT: )?error:' assemble.log || true)
            fi
            if [[ -z "$first_line" ]]; then
              first_line=$(grep -m1 -E '^AAPT: error:' assemble.log || true)
            fi

            # Kotlin Gradle script compile failures (e.g. build.gradle.kts:line:col)
            if [[ -z "$first_line" ]]; then
              first_line=$(grep -m1 -E '^e: .+\.gradle\.kts:[0-9]+:[0-9]+' assemble.log || true)
            fi

            # Gradle script file/line declaration.
            if [[ -z "$first_line" ]]; then
              first_line=$(grep -m1 -E "^(Build|Settings|Script) file '.+' line: [0-9]+" assemble.log || true)
            fi

            # Deterministic fallback when task execution line is available.
            if [[ -z "$first_line" ]]; then
              first_line=$(grep -m1 -E "^Execution failed for task ':[^']+'" assemble.log || true)
            fi

            # Last-resort fallback: first message under '* What went wrong:'
            if [[ -z "$first_line" ]]; then
              first_line=$(awk '/^\* What went wrong:/{flag=1;next} flag && NF {print; exit}' assemble.log)
            fi

            build_context_line=$(grep -m1 -E "^(Build|Settings|Script) file '.+' line: [0-9]+" assemble.log || true)
          fi

          if [[ -n "$first_line" ]]; then
            if [[ "$first_line" =~ file:///([^:]+):([0-9]+):([0-9]+) ]]; then
              offending_path="${BASH_REMATCH[1]}"
              line_no="${BASH_REMATCH[2]}"
              rel_path="${offending_path#${GITHUB_WORKSPACE}/}"
              echo "::error file=${rel_path},line=${line_no}::${first_line}"
              offending_path="$rel_path"
            elif [[ "$first_line" =~ ^e:\ (.+\.gradle\.kts):([0-9]+):([0-9]+) ]]; then
              offending_path="${BASH_REMATCH[1]}"
              line_no="${BASH_REMATCH[2]}"
              rel_path="${offending_path#${GITHUB_WORKSPACE}/}"
              echo "::error file=${rel_path},line=${line_no}::${first_line}"
              offending_path="$rel_path"
            elif [[ "$first_line" =~ ^([^:]+):([0-9]+): ]]; then
              offending_path="${BASH_REMATCH[1]}"
              line_no="${BASH_REMATCH[2]}"
              rel_path="${offending_path#${GITHUB_WORKSPACE}/}"
              echo "::error file=${rel_path},line=${line_no}::${first_line}"
              offending_path="$rel_path"
            elif [[ "$first_line" =~ ^(Build|Settings|Script)\ file\ \'([^\']+)\'\ line:\ ([0-9]+) ]]; then
              offending_path="${BASH_REMATCH[2]}"
              line_no="${BASH_REMATCH[3]}"
              rel_path="${offending_path#${GITHUB_WORKSPACE}/}"
              echo "::error file=${rel_path},line=${line_no}::${first_line}"
              offending_path="$rel_path"
            elif [[ -n "$build_context_line" && "$build_context_line" =~ ^(Build|Settings|Script)\ file\ \'([^\']+)\'\ line:\ ([0-9]+) ]]; then
              offending_path="${BASH_REMATCH[2]}"
              line_no="${BASH_REMATCH[3]}"
              rel_path="${offending_path#${GITHUB_WORKSPACE}/}"
              echo "::error file=${rel_path},line=${line_no}::${first_line} (context: ${build_context_line})"
              offending_path="$rel_path"
            elif [[ "$first_line" =~ ^Execution\ failed\ for\ task\ \'(:[^\']+)\' ]]; then
              offending_path="task${BASH_REMATCH[1]}"
              echo "::error title=AssembleDebug task failure::${first_line}"
            else
              offending_path="module:unknown"
              echo "::error title=AssembleDebug deterministic failure::${first_line}"
            fi
          else
            first_line="NO_ACTIONABLE_STDERR_LINE_FOUND"
            offending_path="module:unknown"
            echo "::error::No actionable stderr line matched in assemble.log"
          fi

          {
            echo "exit_code=${status}"
            echo "offending_path=${offending_path}"
            echo "first_actionable_line<<EOF"
            echo "$first_line"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          exit "$status"

      - name: Run Unit Tests
        if: steps.assemble.outputs.exit_code == '0'
        run: |
          set -o pipefail
          gradle testDebugUnitTest --stacktrace 2>&1 | tee unit-tests.log

      - name: Upload CI logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-ci-logs
          if-no-files-found: warn
          path: |
            gradle-version.log
            assemble.log
            unit-tests.log