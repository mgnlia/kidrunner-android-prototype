name: Android CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle (pin compatible version)
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.7
          cache-disabled: true

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required Android SDK components
        shell: bash
        run: |
          set -euxo pipefail
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0"

      - name: Assemble Debug (deterministic stderr capture)
        id: assemble
        shell: bash
        run: |
          set +e

          if [[ -x "./gradlew" ]]; then
            BUILD_TOOL=(./gradlew)
          else
            BUILD_TOOL=(gradle)
          fi

          "${BUILD_TOOL[@]}" --version 2>&1 | tee gradle-version.log

          # Some AGP paths still look for local.properties first; keep this deterministic.
          if [[ -n "${ANDROID_SDK_ROOT:-}" ]]; then
            echo "sdk.dir=${ANDROID_SDK_ROOT}" > local.properties
          elif [[ -n "${ANDROID_HOME:-}" ]]; then
            echo "sdk.dir=${ANDROID_HOME}" > local.properties
          fi

          "${BUILD_TOOL[@]}" :app:assembleDebug --stacktrace --console=plain \
            > >(tee assemble.stdout.log) \
            2> >(tee assemble.stderr.log >&2)
          status=$?

          cat assemble.stdout.log assemble.stderr.log > assemble.log

          first_line=""
          offending_path=""
          line_no=""
          build_context_line=""

          if [[ -s assemble.stderr.log ]]; then
            # Strong file+line signals first.
            first_line=$(grep -m1 -E '^e: file:///.+\.(kt|java|kts|gradle|xml):[0-9]+:[0-9]+' assemble.stderr.log || true)
            if [[ -z "$first_line" ]]; then
              first_line=$(grep -m1 -E '^e: .+\.(kt|java|kts|gradle|xml):[0-9]+:[0-9]+' assemble.stderr.log || true)
            fi
            if [[ -z "$first_line" ]]; then
              first_line=$(grep -m1 -E '^[^[:space:]]+\.(kt|java|xml|gradle|kts|properties):[0-9]+(:[0-9]+)?(: error:|: )' assemble.stderr.log || true)
            fi

            # Common deterministic Android/Gradle blockers.
            if [[ -z "$first_line" ]]; then
              first_line=$(grep -m1 -E 'SDK location not found\.|local\.properties' assemble.stderr.log || true)
            fi
            if [[ -z "$first_line" ]]; then
              first_line=$(grep -m1 -E 'Failed to install the following Android SDK packages as some licences have not been accepted' assemble.stderr.log || true)
            fi
            if [[ -z "$first_line" ]]; then
              first_line=$(grep -m1 -E '^Execution failed for task '\''(:[^'\'']+)'\''' assemble.stderr.log || true)
            fi

            # Generic but still actionable stderr fallback.
            if [[ -z "$first_line" ]]; then
              first_line=$(grep -m1 -E '(error|ERROR|failed|FAILED|Exception|exception)' assemble.stderr.log || true)
            fi
            if [[ -z "$first_line" ]]; then
              first_line=$(awk 'NF {print; exit}' assemble.stderr.log)
            fi
          fi

          if [[ -z "$first_line" && -s assemble.stdout.log ]]; then
            build_context_line=$(grep -m1 -E "^(Build|Settings|Script) file '.+' line: [0-9]+" assemble.stdout.log || true)
            if [[ -n "$build_context_line" ]]; then
              first_line="$build_context_line"
            else
              first_line=$(grep -m1 -E '^Execution failed for task '\''(:[^'\'']+)'\''' assemble.stdout.log || true)
            fi

            if [[ -z "$first_line" ]]; then
              first_line=$(awk '/^\* What went wrong:/{flag=1;next} flag && NF {print; exit}' assemble.stdout.log)
            fi
            if [[ -z "$first_line" ]]; then
              first_line=$(grep -m1 -E '(error|ERROR|failed|FAILED|Exception|exception)' assemble.stdout.log || true)
            fi
            if [[ -z "$first_line" ]]; then
              first_line=$(awk 'NF {print; exit}' assemble.stdout.log)
            fi
          fi

          if [[ -z "$build_context_line" && -s assemble.stdout.log ]]; then
            build_context_line=$(grep -m1 -E "^(Build|Settings|Script) file '.+' line: [0-9]+" assemble.stdout.log || true)
          fi

          if [[ -n "$first_line" ]]; then
            if [[ "$first_line" =~ file:///([^:]+):([0-9]+):([0-9]+) ]]; then
              offending_path="${BASH_REMATCH[1]}"
              line_no="${BASH_REMATCH[2]}"
              rel_path="${offending_path#${GITHUB_WORKSPACE}/}"
              echo "::error file=${rel_path},line=${line_no}::${first_line}"
              offending_path="$rel_path"
            elif [[ "$first_line" =~ ^e:\ (.+\.(kt|java|kts|gradle|xml)):([0-9]+):([0-9]+) ]]; then
              offending_path="${BASH_REMATCH[1]}"
              line_no="${BASH_REMATCH[3]}"
              rel_path="${offending_path#${GITHUB_WORKSPACE}/}"
              echo "::error file=${rel_path},line=${line_no}::${first_line}"
              offending_path="$rel_path"
            elif [[ "$first_line" =~ ^([^:]+\.(kt|java|xml|gradle|kts|properties)):([0-9]+): ]]; then
              offending_path="${BASH_REMATCH[1]}"
              line_no="${BASH_REMATCH[3]}"
              rel_path="${offending_path#${GITHUB_WORKSPACE}/}"
              echo "::error file=${rel_path},line=${line_no}::${first_line}"
              offending_path="$rel_path"
            elif [[ "$first_line" =~ local\.properties|SDK\ location\ not\ found ]]; then
              offending_path="local.properties"
              line_no="1"
              echo "::error file=local.properties,line=1::${first_line}"
            elif [[ "$first_line" =~ ^(Build|Settings|Script)\ file\ \'([^\']+)\'\ line:\ ([0-9]+) ]]; then
              offending_path="${BASH_REMATCH[2]}"
              line_no="${BASH_REMATCH[3]}"
              rel_path="${offending_path#${GITHUB_WORKSPACE}/}"
              echo "::error file=${rel_path},line=${line_no}::${first_line}"
              offending_path="$rel_path"
            elif [[ -n "$build_context_line" && "$build_context_line" =~ ^(Build|Settings|Script)\ file\ \'([^\']+)\'\ line:\ ([0-9]+) ]]; then
              offending_path="${BASH_REMATCH[2]}"
              line_no="${BASH_REMATCH[3]}"
              rel_path="${offending_path#${GITHUB_WORKSPACE}/}"
              echo "::error file=${rel_path},line=${line_no}::${first_line} (context: ${build_context_line})"
              offending_path="$rel_path"
            elif [[ "$first_line" =~ ^Execution\ failed\ for\ task\ \'(:[^\']+)\' ]]; then
              task_path="${BASH_REMATCH[1]}"
              if [[ "$task_path" == :app:* ]]; then
                offending_path="app/build.gradle.kts"
                line_no="1"
                echo "::error file=app/build.gradle.kts,line=1::${first_line}"
              else
                offending_path="build.gradle.kts"
                line_no="1"
                echo "::error file=build.gradle.kts,line=1::${first_line}"
              fi
            else
              offending_path=".github/workflows/android-ci.yml"
              line_no="1"
              echo "::error file=.github/workflows/android-ci.yml,line=1::${first_line}"
            fi
          else
            first_line="NO_STDERR_OR_STDOUT_OUTPUT_FOUND"
            offending_path=".github/workflows/android-ci.yml"
            line_no="1"
            echo "::error file=.github/workflows/android-ci.yml,line=1::${first_line}"
          fi

          {
            echo "exit_code=${status}"
            echo "offending_path=${offending_path}"
            echo "first_actionable_line<<EOF"
            echo "$first_line"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          exit "$status"

      - name: Run Unit Tests
        if: steps.assemble.outputs.exit_code == '0'
        run: |
          set -o pipefail
          if [[ -x "./gradlew" ]]; then
            ./gradlew :app:testDebugUnitTest --stacktrace 2>&1 | tee unit-tests.log
          else
            gradle :app:testDebugUnitTest --stacktrace 2>&1 | tee unit-tests.log
          fi

      - name: Upload CI logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-ci-logs
          if-no-files-found: warn
          path: |
            local.properties
            gradle-version.log
            assemble.stdout.log
            assemble.stderr.log
            assemble.log
            unit-tests.log